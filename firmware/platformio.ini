; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = src

; ============================================================================
; Base
; ============================================================================
[env]
; The order of the include flags is important for build configuration include precedence.
build_flags =
    -I$BUILD_DIR
    -Iinclude
    ; Note, esp32 arduino core is built with c++11, so this really doesn't matter.
    -std=c++17

extra_scripts = pre:pre.py

build_src_filter =
    +<common/>

; ============================================================================
; ESP32C3 base
; ============================================================================
[env:esp32c3]
platform = espressif32
framework = arduino
board = seeed_xiao_esp32c3

; change microcontroller
board_build.mcu = esp32c3

; change MCU frequency
board_build.f_cpu = 160000000L


; ============================================================================
; Scale firmware
; ============================================================================
[env:scale]
extends = env:esp32c3

lib_deps =
    ${env.lib_deps}
    u8g2
    h2zero/NimBLE-Arduino@^2.1.0

build_src_filter =
    +<*>
    -<thermal/>


; ============================================================================
; Thermal chamber firmware
; ============================================================================
[env:thermal]
extends = env:esp32c3

build_src_filter =
    ${env.build_src_filter}
    +<main.cpp>
    +<thermal/>
